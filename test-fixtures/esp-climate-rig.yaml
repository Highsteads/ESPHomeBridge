# ESP32 test rig for validating Climate (HVAC / thermostat) entities.
# Exposes one virtual thermostat with heat/cool/auto modes plus
# settable setpoints, so we can validate the (yet-to-be-added)
# esphomeClimate device type in ESPHomeBridge.

substitutions:
  device_name: esphome-climate-rig
  friendly_name: ESPHome Climate Test Rig

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ap:
    ssid: "ESPHome-Climate-AP"
    password: "12345678"

captive_portal:

api:
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "indigotestrig"

web_server:
  port: 80
  version: 3

logger:
  level: INFO

# Simulated current temperature - a number entity we can adjust
# (so the climate target can react to it)
sensor:
  - platform: template
    name: "Current Temperature"
    id: current_temp
    lambda: 'return id(temp_value);'
    update_interval: 5s
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s

globals:
  - id: temp_value
    type: float
    initial_value: '20.0'

# Climate entity - thermostat with heat + cool + auto modes
climate:
  - platform: thermostat
    name: "Test Thermostat"
    id: test_thermostat
    sensor: current_temp
    visual:
      min_temperature: 5
      max_temperature: 30
      temperature_step: 0.5
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low:  19
        default_target_temperature_high: 22
      - name: Away
        default_target_temperature_low:  16
        default_target_temperature_high: 26
      - name: Sleep
        default_target_temperature_low:  18
        default_target_temperature_high: 21
    # Simple heat + cool actions (just log; no real outputs)
    heat_action:
      - logger.log: "Thermostat: heating ON"
    cool_action:
      - logger.log: "Thermostat: cooling ON"
    idle_action:
      - logger.log: "Thermostat: idle"
    min_cooling_off_time:  300s
    min_cooling_run_time:  300s
    min_heating_off_time:  300s
    min_heating_run_time:  300s
    min_idle_time:          30s
